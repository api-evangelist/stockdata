generated: '2026-07-22'
method: searched
source: https://www.stockdata.org/documentation#errors
format: custom-envelope
envelope:
  shape: '{"error": {"code": "<error_code>", "message": "<human readable message>"}}'
  fields:
    code: Machine-readable error code string
    message: Human-readable description, usually naming the failed parameters
note: >-
  StockData does not use RFC 9457 application/problem+json; errors are a JSON envelope with a
  documented registry of error codes. Codes below are the provider's published error reference,
  cross-linked to the OpenAPI 4xx/5xx responses.
problems:
  - code: malformed_parameters
    status: 400
    title: Validation of parameters failed
    detail: The failed parameters are usually shown in the error message.
    remediation: Correct the named parameters and retry.
  - code: invalid_api_token
    status: 401
    title: Invalid API token
    detail: The api_token query parameter is missing or not valid.
    remediation: Copy the API token from the StockData account dashboard.
  - code: usage_limit_reached
    status: 402
    title: Usage limit of your plan has been reached
    detail: Daily request quota for the subscription plan is exhausted; limit and remaining requests are exposed on the X-UsageLimit-Limit header family.
    remediation: Wait for the daily quota reset or upgrade the plan.
  - code: endpoint_access_restricted
    status: 403
    title: Endpoint not available on current plan
    detail: Access to the endpoint is not available on the current subscription plan.
    remediation: Upgrade to a plan that includes the endpoint.
  - code: resource_not_found
    status: 404
    title: Resource could not be found
  - code: invalid_api_endpoint
    status: 404
    title: API route does not exist
    remediation: Check the endpoint path against the documentation.
  - code: rate_limit_reached
    status: 429
    title: Too many requests in the past 60 seconds
    detail: Rate limit and remaining requests are exposed on the X-RateLimit-Limit header family.
    remediation: Honor the rate-limit headers and retry after the 60-second window.
  - code: server_error
    status: 500
    title: A server error occurred
    remediation: Retry with backoff; contact support if persistent.
  - code: maintenance_mode
    status: 503
    title: The service is currently under maintenance
    remediation: Retry after maintenance completes.
