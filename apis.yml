apis:
  - aid: stockdata:stockdata
    name: StockData API
    description: >-
      The StockData REST API provides free and paid access to real-time stock
      quotes, intraday price data (adjusted and unadjusted), end-of-day historical
      data, splits, dividends, financial news with sentiment analysis, trending
      entities, and entity search. All endpoints require an api_token parameter.
