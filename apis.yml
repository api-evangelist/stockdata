aid: stockdata
name: StockData
description: >-
  StockData.org provides real-time, intraday, and historical stock, forex,
  and cryptocurrency data along with global financial news and sentiment analysis.
  The REST API delivers market data for US-listed stocks including OHLCV data,
  splits, dividends, and entity-level news sentiment from 5,000+ sources in
  30+ languages.
