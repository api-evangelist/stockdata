    name: Free
    type: freemium
    price_monthly: '0.00'
    price_yearly_equivalent_monthly: '0.00'
    description: Free entry tier with instant self-serve access — no billing details required.
    entries:
      - label: API Requests
        name: api_requests
        type: quota
        metric: requests
        limit: 100
        timeFrame: day
        price: '0.00'
      - {label: Symbols per stock price request, name: symbols_per_quote, type: limit, metric: symbols, limit: 3}
      - {label: Symbols per intraday request, name: symbols_per_intraday, type: limit, metric: symbols, limit: 1}
      - {label: Articles per news request, name: articles_per_request, type: limit, metric: articles, limit: 2}
      - {label: Intraday history, name: intraday_history, type: limit, metric: months, limit: 1}
      - {label: EOD history, name: eod_history, type: limit, metric: months, limit: 1}
