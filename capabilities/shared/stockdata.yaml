naftiko: "1.0.0-alpha1"

info:
  label: StockData API
  description: >-
    StockData.org REST API providing real-time stock quotes, intraday and
    end-of-day historical data, splits, dividends, global financial news
    with sentiment analysis, trending entities, and entity search.
  tags:
    - Finance
    - Financial Data
    - Stock Market
    - Market Data
    - News
    - Sentiment Analysis
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      STOCKDATA_API_TOKEN: STOCKDATA_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: stockdata
      baseUri: https://api.stockdata.org/v1
      description: StockData REST API for market data and financial news.
      authentication:
        type: apikey
        key: api_token
        value: "{{STOCKDATA_API_TOKEN}}"
        placement: query
      resources:
        - name: stock-quotes
          path: /data/quote
          description: Real-time US stock quotes.
          operations:
            - name: get-stock-quote
              method: GET
              description: Get real-time prices for US-listed stocks.
              inputParameters:
                - name: symbols
                  in: query
                  type: string
                  required: true
                  description: Comma-separated ticker symbols.
                - name: extended_hours
                  in: query
                  type: boolean
                  required: false
                  description: Include extended hours data.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: intraday-adjusted
          path: /data/intraday/adjusted
          description: Historical intraday data adjusted for splits.
          operations:
            - name: get-intraday-adjusted
              method: GET
              description: Get split-adjusted historical intraday OHLCV data.
              inputParameters:
                - name: symbols
                  in: query
                  type: string
                  required: true
                  description: Comma-separated ticker symbols.
                - name: interval
                  in: query
                  type: string
                  required: false
                  description: Data interval (minute or hour).
                - name: date_from
                  in: query
                  type: string
                  required: false
                  description: Start date/time (ISO 8601).
                - name: date_to
                  in: query
                  type: string
                  required: false
                  description: End date/time (ISO 8601).
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: intraday-raw
          path: /data/intraday
          description: Historical intraday data without split adjustments.
          operations:
            - name: get-intraday-raw
              method: GET
              description: Get unadjusted historical intraday OHLCV data.
              inputParameters:
                - name: symbols
                  in: query
                  type: string
                  required: true
                  description: Comma-separated ticker symbols.
                - name: interval
                  in: query
                  type: string
                  required: false
                  description: Data interval (minute or hour).
                - name: date_from
                  in: query
                  type: string
                  required: false
                  description: Start date/time (ISO 8601).
                - name: date_to
                  in: query
                  type: string
                  required: false
                  description: End date/time (ISO 8601).
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: eod-data
          path: /data/eod
          description: Historical end-of-day stock data.
          operations:
            - name: get-end-of-day-data
              method: GET
              description: Get historical end-of-day OHLCV data adjusted for splits.
              inputParameters:
                - name: symbols
                  in: query
                  type: string
                  required: true
                  description: Comma-separated ticker symbols.
                - name: interval
                  in: query
                  type: string
                  required: false
                  description: Data interval (day, week, month, quarter, year).
                - name: date_from
                  in: query
                  type: string
                  required: false
                  description: Start date.
                - name: date_to
                  in: query
                  type: string
                  required: false
                  description: End date.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: splits
          path: /data/splits
          description: Historical stock split data.
          operations:
            - name: get-stock-splits
              method: GET
              description: Retrieve historical stock split information.
              inputParameters:
                - name: symbols
                  in: query
                  type: string
                  required: true
                  description: Comma-separated ticker symbols.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: dividends
          path: /data/dividends
          description: Historical dividend records.
          operations:
            - name: get-stock-dividends
              method: GET
              description: Access dividend payment records for US-listed stocks.
              inputParameters:
                - name: symbols
                  in: query
                  type: string
                  required: true
                  description: Comma-separated ticker symbols.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: news
          path: /news/all
          description: Global financial news with sentiment analysis.
          operations:
            - name: get-financial-news
              method: GET
              description: Get global financial news filtered by entities with sentiment analysis.
              inputParameters:
                - name: symbols
                  in: query
                  type: string
                  required: false
                  description: Filter by ticker symbols.
                - name: search
                  in: query
                  type: string
                  required: false
                  description: Full-text search query.
                - name: sentiment_gte
                  in: query
                  type: number
                  required: false
                  description: Minimum sentiment score.
                - name: language
                  in: query
                  type: string
                  required: false
                  description: Language code filter.
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: Page number.
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: Results per page.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: news-trending
          path: /news/stats/trending
          description: Trending financial entities based on news.
          operations:
            - name: get-trending-entities
              method: GET
              description: Identify trending entities based on news volume and sentiment.
              inputParameters:
                - name: group_by
                  in: query
                  type: string
                  required: false
                  description: Field to group results by.
                - name: sentiment_gte
                  in: query
                  type: number
                  required: false
                  description: Minimum sentiment score.
                - name: min_doc_count
                  in: query
                  type: integer
                  required: false
                  description: Minimum article count.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: entity-search
          path: /entity/search
          description: Financial entity search.
          operations:
            - name: search-entities
              method: GET
              description: Search for financial entities by name, symbol, type, or industry.
              inputParameters:
                - name: search
                  in: query
                  type: string
                  required: false
                  description: Search query.
                - name: symbols
                  in: query
                  type: string
                  required: false
                  description: Filter by ticker symbols.
                - name: types
                  in: query
                  type: string
                  required: false
                  description: Filter by entity type.
                - name: industries
                  in: query
                  type: string
                  required: false
                  description: Filter by industry.
                - name: countries
                  in: query
                  type: string
                  required: false
                  description: Filter by country code.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: stockdata-rest
      resources:
        - path: /v1/quotes
          name: quotes
          description: Real-time stock quotes.
          operations:
            - method: GET
              name: get-stock-quote
              description: Get real-time prices for US-listed stocks.
              call: "stockdata.get-stock-quote"
              with:
                symbols: "rest.symbols"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/intraday
          name: intraday
          description: Intraday historical data.
          operations:
            - method: GET
              name: get-intraday-adjusted
              description: Get split-adjusted intraday data.
              call: "stockdata.get-intraday-adjusted"
              with:
                symbols: "rest.symbols"
                interval: "rest.interval"
                date_from: "rest.date_from"
                date_to: "rest.date_to"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/eod
          name: eod
          description: End-of-day historical data.
          operations:
            - method: GET
              name: get-end-of-day-data
              description: Get historical end-of-day data.
              call: "stockdata.get-end-of-day-data"
              with:
                symbols: "rest.symbols"
                interval: "rest.interval"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/news
          name: news
          description: Global financial news.
          operations:
            - method: GET
              name: get-financial-news
              description: Get financial news with sentiment analysis.
              call: "stockdata.get-financial-news"
              with:
                symbols: "rest.symbols"
                search: "rest.search"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: stockdata-mcp
      transport: http
      tools:
        - name: get-stock-quote
          description: Get real-time prices for US-listed stocks.
          hints:
            readOnly: true
            idempotent: true
          call: "stockdata.get-stock-quote"
          with:
            symbols: "tools.symbols"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-intraday-adjusted
          description: Get split-adjusted historical intraday OHLCV data.
          hints:
            readOnly: true
            idempotent: true
          call: "stockdata.get-intraday-adjusted"
          with:
            symbols: "tools.symbols"
            interval: "tools.interval"
            date_from: "tools.date_from"
            date_to: "tools.date_to"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-end-of-day-data
          description: Get historical end-of-day stock data.
          hints:
            readOnly: true
            idempotent: true
          call: "stockdata.get-end-of-day-data"
          with:
            symbols: "tools.symbols"
            interval: "tools.interval"
            date_from: "tools.date_from"
            date_to: "tools.date_to"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-stock-splits
          description: Retrieve historical stock split information.
          hints:
            readOnly: true
            idempotent: true
          call: "stockdata.get-stock-splits"
          with:
            symbols: "tools.symbols"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-stock-dividends
          description: Get dividend payment records for US-listed stocks.
          hints:
            readOnly: true
            idempotent: true
          call: "stockdata.get-stock-dividends"
          with:
            symbols: "tools.symbols"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-financial-news
          description: Get global financial news with entity sentiment analysis.
          hints:
            readOnly: true
            idempotent: true
          call: "stockdata.get-financial-news"
          with:
            symbols: "tools.symbols"
            search: "tools.search"
            sentiment_gte: "tools.sentiment_gte"
            language: "tools.language"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-trending-entities
          description: Identify trending financial entities based on news volume.
          hints:
            readOnly: true
            idempotent: true
          call: "stockdata.get-trending-entities"
          with:
            group_by: "tools.group_by"
          outputParameters:
            - type: object
              mapping: "$."

        - name: search-entities
          description: Search for financial entities by name, symbol, type, or industry.
          hints:
            readOnly: true
            idempotent: true
          call: "stockdata.search-entities"
          with:
            search: "tools.search"
            types: "tools.types"
            industries: "tools.industries"
          outputParameters:
            - type: object
              mapping: "$."
