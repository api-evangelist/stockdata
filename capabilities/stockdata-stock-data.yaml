naftiko: 1.0.0-alpha2
info:
  label: StockData API — Stock Data
  description: 'StockData API — Stock Data. 6 operations. Lead operation: Get Stock Dividends. Self-contained Naftiko capability
    covering one Stockdata business surface.'
  tags:
  - Stockdata
  - Stock Data
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STOCKDATA_API_KEY: STOCKDATA_API_KEY
capability:
  consumes:
  - type: http
    namespace: stockdata-stock-data
    baseUri: https://api.stockdata.org/v1
    description: StockData API — Stock Data business capability. Self-contained, no shared references.
    resources:
    - name: data-dividends
      path: /data/dividends
      operations:
      - name: getstockdividends
        method: GET
        description: Get Stock Dividends
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: api_token
          in: query
          type: string
          description: Your API token from the StockData dashboard.
          required: true
        - name: symbols
          in: query
          type: string
          description: Comma-separated list of stock ticker symbols.
          required: true
    - name: data-eod
      path: /data/eod
      operations:
      - name: getendofdaydata
        method: GET
        description: Get End-of-Day Historical Data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: api_token
          in: query
          type: string
          description: Your API token from the StockData dashboard.
          required: true
        - name: symbols
          in: query
          type: string
          description: Comma-separated list of stock ticker symbols.
          required: true
        - name: interval
          in: query
          type: string
          description: Data interval.
        - name: date_from
          in: query
          type: string
          description: Start date for the data range.
        - name: date_to
          in: query
          type: string
          description: End date for the data range.
        - name: sort
          in: query
          type: string
          description: Sort order for results.
    - name: data-intraday
      path: /data/intraday
      operations:
      - name: getintradayraw
        method: GET
        description: Get Raw Intraday Data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: api_token
          in: query
          type: string
          description: Your API token from the StockData dashboard.
          required: true
        - name: symbols
          in: query
          type: string
          description: Comma-separated list of stock ticker symbols.
          required: true
        - name: interval
          in: query
          type: string
          description: Data interval (minute or hour).
        - name: date_from
          in: query
          type: string
          description: Start date/time for the data range (ISO 8601).
        - name: date_to
          in: query
          type: string
          description: End date/time for the data range (ISO 8601).
        - name: sort
          in: query
          type: string
          description: Sort order for results.
    - name: data-intraday-adjusted
      path: /data/intraday/adjusted
      operations:
      - name: getintradayadjusted
        method: GET
        description: Get Adjusted Intraday Data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: api_token
          in: query
          type: string
          description: Your API token from the StockData dashboard.
          required: true
        - name: symbols
          in: query
          type: string
          description: Comma-separated list of stock ticker symbols.
          required: true
        - name: interval
          in: query
          type: string
          description: Data interval (minute or hour).
        - name: date_from
          in: query
          type: string
          description: Start date/time for the data range (ISO 8601).
        - name: date_to
          in: query
          type: string
          description: End date/time for the data range (ISO 8601).
        - name: sort
          in: query
          type: string
          description: Sort order for results.
    - name: data-quote
      path: /data/quote
      operations:
      - name: getstockquote
        method: GET
        description: Get Stock Quote
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: api_token
          in: query
          type: string
          description: Your API token from the StockData dashboard.
          required: true
        - name: symbols
          in: query
          type: string
          description: Comma-separated list of stock ticker symbols (e.g., AAPL,MSFT,TSLA).
          required: true
        - name: extended_hours
          in: query
          type: boolean
          description: Include pre/post market extended hours data.
        - name: key_by_ticker
          in: query
          type: boolean
          description: Key response data by ticker symbol instead of array index.
    - name: data-splits
      path: /data/splits
      operations:
      - name: getstocksplits
        method: GET
        description: Get Stock Splits
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: api_token
          in: query
          type: string
          description: Your API token from the StockData dashboard.
          required: true
        - name: symbols
          in: query
          type: string
          description: Comma-separated list of stock ticker symbols.
          required: true
    authentication:
      type: apikey
      key: api_token
      value: '{{env.STOCKDATA_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: stockdata-stock-data-rest
    port: 8080
    description: REST adapter for StockData API — Stock Data. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/data/dividends
      name: data-dividends
      description: REST surface for data-dividends.
      operations:
      - method: GET
        name: getstockdividends
        description: Get Stock Dividends
        call: stockdata-stock-data.getstockdividends
        with:
          api_token: rest.api_token
          symbols: rest.symbols
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/data/eod
      name: data-eod
      description: REST surface for data-eod.
      operations:
      - method: GET
        name: getendofdaydata
        description: Get End-of-Day Historical Data
        call: stockdata-stock-data.getendofdaydata
        with:
          api_token: rest.api_token
          symbols: rest.symbols
          interval: rest.interval
          date_from: rest.date_from
          date_to: rest.date_to
          sort: rest.sort
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/data/intraday
      name: data-intraday
      description: REST surface for data-intraday.
      operations:
      - method: GET
        name: getintradayraw
        description: Get Raw Intraday Data
        call: stockdata-stock-data.getintradayraw
        with:
          api_token: rest.api_token
          symbols: rest.symbols
          interval: rest.interval
          date_from: rest.date_from
          date_to: rest.date_to
          sort: rest.sort
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/data/intraday/adjusted
      name: data-intraday-adjusted
      description: REST surface for data-intraday-adjusted.
      operations:
      - method: GET
        name: getintradayadjusted
        description: Get Adjusted Intraday Data
        call: stockdata-stock-data.getintradayadjusted
        with:
          api_token: rest.api_token
          symbols: rest.symbols
          interval: rest.interval
          date_from: rest.date_from
          date_to: rest.date_to
          sort: rest.sort
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/data/quote
      name: data-quote
      description: REST surface for data-quote.
      operations:
      - method: GET
        name: getstockquote
        description: Get Stock Quote
        call: stockdata-stock-data.getstockquote
        with:
          api_token: rest.api_token
          symbols: rest.symbols
          extended_hours: rest.extended_hours
          key_by_ticker: rest.key_by_ticker
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/data/splits
      name: data-splits
      description: REST surface for data-splits.
      operations:
      - method: GET
        name: getstocksplits
        description: Get Stock Splits
        call: stockdata-stock-data.getstocksplits
        with:
          api_token: rest.api_token
          symbols: rest.symbols
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: stockdata-stock-data-mcp
    port: 9090
    transport: http
    description: MCP adapter for StockData API — Stock Data. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-stock-dividends
      description: Get Stock Dividends
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: stockdata-stock-data.getstockdividends
      with:
        api_token: tools.api_token
        symbols: tools.symbols
      outputParameters:
      - type: object
        mapping: $.
    - name: get-end-day-historical-data
      description: Get End-of-Day Historical Data
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: stockdata-stock-data.getendofdaydata
      with:
        api_token: tools.api_token
        symbols: tools.symbols
        interval: tools.interval
        date_from: tools.date_from
        date_to: tools.date_to
        sort: tools.sort
      outputParameters:
      - type: object
        mapping: $.
    - name: get-raw-intraday-data
      description: Get Raw Intraday Data
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: stockdata-stock-data.getintradayraw
      with:
        api_token: tools.api_token
        symbols: tools.symbols
        interval: tools.interval
        date_from: tools.date_from
        date_to: tools.date_to
        sort: tools.sort
      outputParameters:
      - type: object
        mapping: $.
    - name: get-adjusted-intraday-data
      description: Get Adjusted Intraday Data
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: stockdata-stock-data.getintradayadjusted
      with:
        api_token: tools.api_token
        symbols: tools.symbols
        interval: tools.interval
        date_from: tools.date_from
        date_to: tools.date_to
        sort: tools.sort
      outputParameters:
      - type: object
        mapping: $.
    - name: get-stock-quote
      description: Get Stock Quote
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: stockdata-stock-data.getstockquote
      with:
        api_token: tools.api_token
        symbols: tools.symbols
        extended_hours: tools.extended_hours
        key_by_ticker: tools.key_by_ticker
      outputParameters:
      - type: object
        mapping: $.
    - name: get-stock-splits
      description: Get Stock Splits
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: stockdata-stock-data.getstocksplits
      with:
        api_token: tools.api_token
        symbols: tools.symbols
      outputParameters:
      - type: object
        mapping: $.
