schemes:
- name: ApiToken
  type: apiKey
  in: query
  parameter: api_token
  description: >-
    API token obtained from the StockData account dashboard after free self-serve signup
    (no billing details required). Added as a GET query parameter on every endpoint;
    an invalid or missing token returns 401 invalid_api_token.
  signup: https://www.stockdata.org/register
  sources:
  - openapi/stockdata-openapi.yml
notes:
  - No OAuth 2.0, OpenID Connect, or header-based auth is offered; the api_token query parameter is the only mechanism.
  - Because the token travels in the query string, avoid logging full request URLs.
